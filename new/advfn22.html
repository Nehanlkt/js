<body>

    <script>
        [1,-3,5].filter((value,index )=>{
            // if(value>=0){

        // map method
        console.log([1,1,3].map((value,index)=>{
            return value*2;

        }));
        // shorthand
         console.log([1,1,3].map(value=> value*2));

        //  closule if a fn has access to value
        // it will always have access to that value
        




    </script>
