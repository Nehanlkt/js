<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-color: black;
            color: aliceblue;
            /* font-weight: bold; */
        }
        .heading{
            font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
            font-weight: bold;
            font-size: 50px;
            font-style: inherit;

        }
        .move-icon{
            height: 50px;
        }
        .move-button{
            background-color: transparent;
            /* border-radius: 20px; */
            /* border: 3px solid bisque; */
            border: 1px solid whitesmoke;
            width: 100px;
            height: 100px;
            border-radius: 65px;
            margin-right: 10px;
            cursor: pointer;
        }
        .result{
            font-weight: bold;
            font-size: 25px;
        }
        .score{
            margin-top: 60px;
        }
        .reset{
            background-color: white;
            border:none;
            font-size: 15px;
            cursor: pointer;
        }


    </style>
</head>

<body>
    <p class="heading">rock paper scissors</p>
    <button onclick="
   playgame('rock');


    " class="move-button"><img src="rock.jpeg" class="move-icon" ></button>
    <button onclick="
    playgame('paper');

            
             " class="move-button">
        <img src="paper.jpeg" class="move-icon">
    </button>
    <button onclick="
    playgame('scissors');

             
    " class="move-button"><img src="scessor.jpeg" class="move-icon"></button>

    <p class="js-result result"></p>
    <p class="js-moves">you <img src="rock.jpeg" class="move-icon"><img src="scessor.jpeg" class="move-icon">computer</p>
    <p class="js-score score"></p>

     

    <button onclick="
    score.wins=0;
    score.losses=0;
    score.tie=0;
    localStorage.removeItem('score');
    updatescore();
    "class="reset">reset score</button>

    <script>
        let score = 
            JSON.parse(localStorage.getItem('score'));
            if(score===null){
                score={
                    wins:0,
                    losses:0,
                    ties:0
                };
            }
    
        
        

        function playgame(playerMove) {
            let comuterMove = pick();
            let result = '';


            if (playerMove == 'rock') {
                // let result = '';
                if (comuterMove === 'rock') {
                    result = 'tie';
                } else if (comuterMove === 'paper') {
                    result = 'you lose';
                } else if (comuterMove === 'scissors') {
                    result = 'you win';
                }
            }
            else if (playerMove == 'paper') {
                comuterMove = pick();
                result = ' ';
                if (comuterMove == 'paper') {
                    result = 'tie';
                } else if (comuterMove == 'rock') {
                    result = 'win';
                }
                else {
                    result = 'loose';

                }

            }
            else if (playerMove == 'scissors') {
                comuterMove = pick();
                result = ' ';
                if (comuterMove == 'scissors') {
                    result = 'tie';
                } else if (comuterMove == 'rock') {
                    result = 'loose';
                }
                else {
                    result = 'win';

                }

            }

            if (result === 'win') {
                score.win += 1;
            } else if (result === 'loose') {
                score.losses += 1;
            } else if (result === 'tie') {
                score.tie += 1;
            }
            // json bcz its only support strings this localstorage
            localStorage.setItem('score',JSON.stringify(score));
            updatescore();


            alert(`you picked ${playerMove}.computer picked${comuterMove}.${result}
         wins:${score.win},losses:${score.losses},ties:${score.tie}`);
        }
        function updatescore(){
            document.querySelector('.js-score').innerHTML=` wins:${score.win},losses:${score.losses},ties:${score.tie}`;

        }



        // let comuterMove = ' ';//global
        // or using return statement we can place this inside fn only and get assced
        function pick() {
            const randomnum = Math.random()
            let comuterMove = ' ';
            // variable is here,local so u cant get op
            if (randomnum >= 0 && randomnum < 1 / 3) {
                comuterMove = 'rock';
            } else if (randomnum >= 1 / 3 && randomnum < 2 / 3) {
                comuterMove = 'paper';

            } else if (randomnum >= 2 / 3 && randomnum < 1) {
                comuterMove = 'scissors';
            }
            return comuterMove;
            // return helps to get the value out of function
            // return; will return undefine
            console.log('hi');
            // this will not print after return ntg vl print

        }


    </script>
</body>
