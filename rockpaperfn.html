<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <p>rock paper scissors</p>
    <button onclick="
   playgame('rock');


    ">rock</button>
    <button onclick="
    playgame('paper');

            
             ">
        paper
    </button>
    <button onclick="
    playgame('scissors');

             
    ">scissors</button>

    <button onclick="
    score.wins=0;
    score.losses=0;
    score.tie=0;
    localStorage.removeItem('score');
    ">reset score</button>

    <script>
        let score = 
            JSON.parse(localStorage.getItem('score'));
            if(score===null){
                score={
                    wins:0,
                    losses:0,
                    ties:0
                };
            }
        

        function playgame(playerMove) {
            let comuterMove = pick();
            let result = '';


            if (playerMove == 'rock') {
                // let result = '';
                if (comuterMove === 'rock') {
                    result = 'tie';
                } else if (comuterMove === 'paper') {
                    result = 'you lose';
                } else if (comuterMove === 'scissors') {
                    result = 'you win';
                }
            }
            else if (playerMove == 'paper') {
                comuterMove = pick();
                result = ' ';
                if (comuterMove == 'paper') {
                    result = 'tie';
                } else if (comuterMove == 'rock') {
                    result = 'win';
                }
                else {
                    result = 'loose';

                }

            }
            else if (playerMove == 'scissors') {
                comuterMove = pick();
                result = ' ';
                if (comuterMove == 'scissors') {
                    result = 'tie';
                } else if (comuterMove == 'rock') {
                    result = 'loose';
                }
                else {
                    result = 'win';

                }

            }

            if (result === 'win') {
                score.win += 1;
            } else if (result === 'loose') {
                score.losses += 1;
            } else if (result === 'tie') {
                score.tie += 1;
            }
            // json bcz its only support strings this localstorage
            localStorage.getItem('score',JSON.stringify(score));


            alert(`you picked ${playerMove}.computer picked${comuterMove}.${result}
         wins:${score.win},losses:${score.losses},ties:${score.tie}`);
        }



        // let comuterMove = ' ';//global
        // or using return statement we can place this inside fn only and get assced
        function pick() {
            const randomnum = Math.random()
            let comuterMove = ' ';
            // variable is here,local so u cant get op
            if (randomnum >= 0 && randomnum < 1 / 3) {
                comuterMove = 'rock';
            } else if (randomnum >= 1 / 3 && randomnum < 2 / 3) {
                comuterMove = 'paper';

            } else if (randomnum >= 2 / 3 && randomnum < 1) {
                comuterMove = 'scissors';
            }
            return comuterMove;
            // return helps to get the value out of function
            // return; will return undefine
            console.log('hi');
            // this will not print after return ntg vl print

        }


    </script>
</body>
